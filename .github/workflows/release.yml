name: Release

on:
  push:
    tags:
      - "v*"

# Required repository secrets (Settings → Secrets and variables → Actions):
#   DEVELOPER_ID_CERT_P12         base64 of your "Developer ID Application" .p12
#                                 (base64 -i cert.p12 | pbcopy)
#   DEVELOPER_ID_CERT_PASSWORD    password used when exporting that .p12
#   KEYCHAIN_PASSWORD             any throwaway string for the ephemeral keychain
#   SIGN_IDENTITY                 e.g. "Developer ID Application: Jane Doe (ABCDE12345)"
#   NOTARY_APPLE_ID               your Apple ID email
#   NOTARY_TEAM_ID                your 10-char Team ID
#   NOTARY_PASSWORD               an app-specific password for that Apple ID

permissions:
  contents: write   # needed to create the GitHub Release

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Derive version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Import Developer ID certificate
        env:
          CERT_P12: ${{ secrets.DEVELOPER_ID_CERT_P12 }}
          CERT_PW: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
          KEYCHAIN_PW: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          echo "$CERT_P12" | base64 --decode > /tmp/cert.p12
          security create-keychain -p "$KEYCHAIN_PW" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p "$KEYCHAIN_PW" build.keychain
          security import /tmp/cert.p12 -k build.keychain -P "$CERT_PW" \
            -T /usr/bin/codesign -T /usr/bin/security
          security list-keychains -d user -s build.keychain login.keychain
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PW" build.keychain
          rm -f /tmp/cert.p12

      - name: Store notarytool credentials
        env:
          NOTARY_APPLE_ID: ${{ secrets.NOTARY_APPLE_ID }}
          NOTARY_TEAM_ID: ${{ secrets.NOTARY_TEAM_ID }}
          NOTARY_PASSWORD: ${{ secrets.NOTARY_PASSWORD }}
        run: |
          xcrun notarytool store-credentials "WO_NOTARY" \
            --apple-id "$NOTARY_APPLE_ID" \
            --team-id "$NOTARY_TEAM_ID" \
            --password "$NOTARY_PASSWORD"

      - name: Build icon + app
        run: |
          python3 scripts/make_icon.py
          scripts/make_icon.sh
          scripts/build.sh "${{ steps.ver.outputs.version }}"

      - name: Sign, notarize, staple, package
        env:
          SIGN_IDENTITY: ${{ secrets.SIGN_IDENTITY }}
          NOTARY_PROFILE: WO_NOTARY
        run: scripts/sign_notarize.sh "${{ steps.ver.outputs.version }}"

      - name: Compute DMG checksum
        id: sha
        run: |
          DMG="build/Spacestrator-${{ steps.ver.outputs.version }}.dmg"
          echo "sha256=$(shasum -a 256 "$DMG" | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DMG="build/Spacestrator-${{ steps.ver.outputs.version }}.dmg"
          gh release create "${GITHUB_REF_NAME}" "$DMG" \
            --title "${GITHUB_REF_NAME}" \
            --notes "Automated release.

          Homebrew cask values:
          \`\`\`
          version \"${{ steps.ver.outputs.version }}\"
          sha256 \"${{ steps.sha.outputs.sha256 }}\"
          \`\`\`"

      - name: Job summary
        run: |
          echo "### Released ${GITHUB_REF_NAME}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Update \`packaging/homebrew/spacestrator.rb\`:" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "version \"${{ steps.ver.outputs.version }}\"" >> "$GITHUB_STEP_SUMMARY"
          echo "sha256 \"${{ steps.sha.outputs.sha256 }}\"" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
